<!DOCTYPE html>
<html lang="pt-BR" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sige - Gestão de Emergência e Inspeções</title>
    
    <!-- Configurações PWA -->
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/png" href="./logo.png">
    <link rel="apple-touch-icon" href="./logo.png">
    <meta name="theme-color" content="#16a34a">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 500: '#22c55e', 600: '#16a34a', 700: '#15803d', 900: '#14532d' },
                        petro: { yellow: '#FFD700', green: '#008000' },
                        darkbg: '#0f172a', darkcard: '#1e293b'
                    }
                }
            }
        }
    </script>
    
    <!-- Bibliotecas -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #FFD700; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .view-section { display: none; opacity: 0; transition: opacity 0.3s ease-in-out; }
        .view-section.active { display: block; opacity: 1; }
        
        .input-base {
            width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #cbd5e1;
            background-color: #ffffff; color: #0f172a; outline: none; transition: all 0.2s;
        }
        .input-base:focus { border-color: #22c55e; box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.2); }
        .dark .input-base { background-color: #334155; border-color: #475569; color: #f8fafc; }
        .dark .input-base:focus { border-color: #4ade80; }
        
        input[type="file"]::file-selector-button {
            padding: 0.5rem 1rem; border-radius: 0.5rem; border: none;
            background-color: #16a34a; color: white; cursor: pointer; transition: background-color 0.2s;
            font-weight: bold;
        }
        input[type="file"]::file-selector-button:hover { background-color: #15803d; }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 dark:bg-darkbg dark:text-slate-200 transition-colors duration-200 h-screen overflow-hidden flex flex-col md:flex-row">

    <!-- SPLASH SCREEN -->
    <div id="splash-screen" class="fixed inset-0 bg-slate-900 z-[100] flex flex-col items-center justify-center text-white transition-opacity duration-500">
        <img src="./logo.png" alt="Logo" class="w-32 h-32 mb-6 object-contain drop-shadow-lg" onerror="this.src='https://placehold.co/200x200/008000/FFFFFF?text=SIGE'">
        <h1 class="text-4xl font-extrabold tracking-wider text-petro-yellow">SIGE SMS</h1>
        <p class="text-slate-300 mt-2 font-medium tracking-wide">Gestão de Emergência</p>
        <div class="loader mt-10"></div>
        <p class="text-sm mt-6 text-slate-400" id="splash-status">Inicializando sistema offline...</p>
    </div>

    <!-- TELA DE LOGIN -->

                <h2 class="text-3xl font-bold">Acesso ao Sistema</h2>
                <p class="text-brand-100 text-sm mt-2 opacity-90">Identifique-se para iniciar o plantão</p>
            </div>
            <div class="p-6 md:p-8 space-y-6">
                <form id="login-form" class="space-y-5">
                    <div>
                        <label class="block text-sm font-semibold mb-1 text-slate-700 dark:text-slate-300">Perfil de Acesso</label>
                        <select id="login-role" class="input-base">
                            <option value="operador">Técnico de Segurança / Bombeiro</option>
                            <option value="admin">Administrador do Sistema</option>
                        </select>
                    </div>
                    <div>
